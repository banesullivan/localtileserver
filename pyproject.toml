[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "localtileserver"
version = "0.11.0"
description = "Locally serve geospatial raster tiles in the Slippy Map standard."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    {name = "Bane Sullivan", email = "hello@banesullivan.com"},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "click",
    "fastapi>=0.100.0",
    "uvicorn[standard]",
    "jinja2",
    "rio-tiler",
    "rio-cogeo",
    "requests",
    "server-thread",
    "scooby",
]

[project.optional-dependencies]
colormaps = [
    "matplotlib",
    "cmocean",
    "colorcet",
]
jupyter = [
    "jupyter-server-proxy",
    "ipyleaflet",
]
helpers = [
    "shapely",
]

[project.urls]
Documentation = "https://localtileserver.banesullivan.com"
"Bug Tracker" = "https://github.com/banesullivan/localtileserver/issues"
"Source Code" = "https://github.com/banesullivan/localtileserver"

[project.scripts]
localtileserver = "localtileserver.__main__:run_app"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["localtileserver*"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = [
    "F",      # pyflakes
    "E", "W", # pycodestyle
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "RUF",    # ruff-specific rules
]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401", "F403"]
"*.ipynb" = ["E402", "E741"]
"doc/**" = ["E501"]

[tool.ruff.lint.isort]
force-sort-within-sections = true
combine-as-imports = true
