name: Tests
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6.0.1
      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install localtileserver with test dependencies
        run: pip install -e ".[test,colormaps,jupyter,xarray,helpers]"
      - name: Scooby Report
        run: python -c "import localtileserver;print(localtileserver.Report())"
      - name: Run Tests
        run: |
          pytest --cov=localtileserver
          coverage xml -o coverage.xml
      - uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          verbose: true
