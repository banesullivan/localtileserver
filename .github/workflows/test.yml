name: Tests
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC auth to codecov
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install localtileserver with test dependencies
        run: pip install -e ".[test,colormaps,jupyter,xarray,helpers]"
      - name: Scooby Report
        run: python -c "import localtileserver;print(localtileserver.Report())"
      - name: Run Tests
        run: |
          pytest --cov=localtileserver
          coverage xml -o coverage.xml
      - uses: codecov/codecov-action@v6.0.0
        with:
          use_oidc: true
          files: coverage.xml
          verbose: true
